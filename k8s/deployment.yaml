apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: todo-api
  template:
    metadata:
      labels:
        app: todo-api
    spec:
      containers:
        - name: todo-api
          image: registry:5000/todo-api:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: DB_HOST
              value: database
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: testdb
            - name: DB_USER
              value: postgres
            - name: DB_PASSWORD
              value: secret
          ports:
            - containerPort: 3001
