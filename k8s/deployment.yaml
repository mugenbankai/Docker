apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo-api
  template:
    metadata:
      labels:
        app: todo-api
    spec:
      containers:
        - name: todo-api
          image: <pseudo-dockerhub>/todo-api:latest
          imagePullPolicy: Always
          env:
            - name: DATABASE_URL
              value: postgres://postgres:secret@database:5432/testdb
          ports:
            - containerPort: 3001
