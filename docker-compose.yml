version: '3.8'
services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - frontend

  api:
    build: .
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DATABASE_URL=postgresql://todo_user:todo_pass@database:5432/todo_db
    volumes:
      - ./src:/app/src
      - api-logs:/app/logs
      - todo-logs:/data
    depends_on:
      - database
    networks:
      - frontend
      - backend

  database:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=todo_db
      - POSTGRES_USER=todo_user
      - POSTGRES_PASSWORD=todo_pass
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - backend

volumes:
  todo-logs:
    external: true
  api-logs:
  postgres-data:

networks:
  frontend:
  backend:
