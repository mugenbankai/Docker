name: CI

on:
  push:
  pull_request:

env:
  IMAGE_NAME: docker.io/${{ secrets.DOCKERHUB_USERNAME || github.repository_owner }}/todo-api

jobs:
  test-unit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

  test-integration:
    runs-on: ubuntu-latest
    needs: test-unit
    container:
      image: node:20-alpine
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: todo_test
          POSTGRES_USER: todo_user
          POSTGRES_PASSWORD: todo_pass
        options: >-
          --health-cmd="pg_isready -U todo_user -d todo_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: todo_test
      DB_USER: todo_user
      DB_PASSWORD: todo_pass
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npm run test:integration

  build-image:
    runs-on: ubuntu-latest
    needs: [test-unit, test-integration]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to DockerHub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

  deploy-k3s:
    runs-on: ubuntu-latest
    needs: build-image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    container:
      image: bitnami/kubectl:latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Load kubeconfig
        run: |
          mkdir -p ~/.kube
          printf '%s' "${KUBE_CONFIG}" > ~/.kube/config
          chmod 600 ~/.kube/config
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}

      - name: Apply manifests
        run: kubectl apply -f k8s/

      - name: Update application image
        run: kubectl set image deployment/todo-api todo-api=${IMAGE_NAME}:${GITHUB_SHA}
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}

      - name: Wait for rollout
        run: kubectl rollout status deployment/todo-api --timeout=180s
